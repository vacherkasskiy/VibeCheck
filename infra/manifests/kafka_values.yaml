global:
  security:
    allowInsecureImages: true

image:
  registry: docker.io
  repository: bitnamilegacy/kafka
  tag: "4.0.0-debian-12-r10"
  pullPolicy: IfNotPresent

kraft:
  enabled: true

rbac:
  create: true

serviceAccount:
  create: true
  automountServiceAccountToken: true

controller:
  replicaCount: 1
  automountServiceAccountToken: true
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

broker:
  replicaCount: 1
  automountServiceAccountToken: true
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

listeners:
  client:
    protocol: SASL_PLAINTEXT
  controller:
    protocol: SASL_PLAINTEXT
  interbroker:
    protocol: SASL_PLAINTEXT
  external:
    protocol: SASL_PLAINTEXT

sasl:
  enabledMechanisms: PLAIN
  interBrokerMechanism: PLAIN
  controllerMechanism: PLAIN
  interbroker:
    user: inter_broker_user
    password: "inter_broker_password"
  controller:
    user: controller_user
    password: "controller_password"
  client:
    users:
      - app_user
    passwords: "app_password"

externalAccess:
  enabled: true
  broker:
    service:
      type: LoadBalancer

defaultInitContainers:
  volumePermissions:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/os-shell
      tag: "12-debian-12-r51"
      pullPolicy: IfNotPresent
  autoDiscovery:
    enabled: true
    image:
      registry: docker.io
      repository: bitnamilegacy/kubectl
      tag: "1.33.4-debian-12-r0"
      pullPolicy: IfNotPresent

provisioning:
  enabled: true
  waitForKafka: true
  useHelmHooks: true
  numPartitions: 1
  replicationFactor: 1
  topics:
    - name: reviews
      partitions: 1
      replicationFactor: 1
    - name: gamification
      partitions: 1
      replicationFactor: 1
    - name: subscriptions
      partitions: 1
      replicationFactor: 1
    - name: users
      partitions: 1
      replicationFactor: 1
    - name: reports
      partitions: 1
      replicationFactor: 1

metrics:
  jmx:
    enabled: false