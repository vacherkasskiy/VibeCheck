apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: vibecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: gonefladvedotov/vibecheck-user-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secrets
            - secretRef:
                name: user-service-mail-secrets
          volumeMounts:
            - name: internal-jwt-key
              mountPath: /var/run/secrets/internal-jwt
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: internal-jwt-key
          secret:
            secretName: user-service-internal-jwt-key
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: vibecheck
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8080
      targetPort: http
