services:
  user-service-postgres:
    image: postgres:16-alpine
    container_name: user_service_api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: user_service_api_db
      POSTGRES_USER: vitalik
      POSTGRES_PASSWORD: huy_sosi
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: 128mb
    command:
      [
        "postgres",
        "-c", "max_connections=30",
        "-c", "shared_buffers=128MB",
        "-c", "work_mem=4MB",
        "-c", "maintenance_work_mem=64MB",
        "-c", "effective_cache_size=256MB",
        "-c", "wal_buffers=4MB"
      ]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitalik -d user_service_api_db"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-service-redis:
    image: redis:7-alpine
    container_name: user_service_api_redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly", "no",
        "--save", "900", "1",
        "--maxmemory", "128mb",
        "--maxmemory-policy", "allkeys-lru"
      ]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

  user-service-kafka:
    image: apache/kafka:4.0.2
    container_name: user_service_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s

  user-service-kafka-topics:
    image: apache/kafka:4.0.2
    container_name: user_service_kafka_topics
    depends_on:
      user-service-kafka:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server user-service-kafka:9092 --create --if-not-exists --topic users --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server user-service-kafka:9092 --create --if-not-exists --topic reports --partitions 1 --replication-factor 1

  user-service-minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    container_name: user_service_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  user-service-minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: user_service_minio_init
    depends_on:
      user-service-minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://user-service-minio:9000 minio_admin minio_admin_password
        mc mb --ignore-existing local/user-service

volumes:
  postgres_data:
  redis_data:
  minio_data:
