apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: review-service
  namespace: vibecheck
spec:
  ingressClassName: nginx
  rules:
    - host: review.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: review-service
                port:
                  number: 8080