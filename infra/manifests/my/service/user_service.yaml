apiVersion: v1
kind: Namespace
metadata:
  name: vibecheck
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: vibecheck
data:
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-postgresql:5432/user_service_api_db"
  SPRING_DATA_REDIS_HOST: "redis-master"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_MAIL_HOST: "smtp.yandex.ru"
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_USERNAME: "vibecheck-official@yandex.com"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka.vibecheck.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "user-service-reports"
  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "PLAIN"
  USER_SERVICE_KAFKA_TOPIC_USERS: "users"
  USER_SERVICE_KAFKA_TOPIC_REPORTS: "reports"
  APP_JWT_ISSUER: "auth-service"
  APP_JWT_AUDIENCE: "user-service"
  APP_INTERNAL_JWT_ISSUER: "user-service"
  APP_INTERNAL_JWT_TTL: "PT5M"
  APP_INTERNAL_JWT_KID: "internal-key-2026-04"
  APP_INTERNAL_JWT_PRIVATE_KEY_PATH: "/var/run/secrets/internal-jwt/private.pem"
  APP_MINIO_ENDPOINT: "http://minio.vibecheck.svc.cluster.local:9000"
  APP_MINIO_PUBLIC_ENDPOINT: "http://minio.vibecheck.svc.cluster.local:9000"
  APP_MINIO_BUCKET: "user-service"
  APP_MINIO_USE_SSL: "false"
  USER_SERVICE_AVATAR_SEED_ENABLED: "true"
  USER_SERVICE_AVATAR_SEED_OBJECT_PREFIX: "avatars"
  USER_SERVICE_TEST_USERS_SEED_ENABLED: "true"
  USER_SERVICE_TEST_USERS_SEED_DEFAULT_PASSWORD: "Test123!"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: vibecheck
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "app_user"
  SPRING_DATASOURCE_PASSWORD: "app_password"
  SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="app_user" password="app_password";'
  APP_JWT_SECRET: "change-this-super-long-random-secret-key-change-this-super-long-random-secret-key"
  APP_MINIO_ACCESS_KEY: "minio_admin"
  APP_MINIO_SECRET_KEY: "minio_admin_password"
---
