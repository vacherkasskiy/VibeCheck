apiVersion: v1
kind: Namespace
metadata:
  name: vibecheck
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: vibecheck
data:
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-postgresql:5432/user_service_api_db"
  SPRING_DATA_REDIS_HOST: "redis-master"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_MAIL_HOST: "smtp.yandex.ru"
  SPRING_MAIL_PORT: "587"
  SPRING_MAIL_USERNAME: "vvfedotov@edu.hse.ru"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka.vibecheck.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "user-service-reports"
  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "PLAIN"
  USER_SERVICE_KAFKA_TOPIC_USERS: "users"
  USER_SERVICE_KAFKA_TOPIC_REPORTS: "reports"
  APP_JWT_ISSUER: "auth-service"
  APP_JWT_AUDIENCE: "user-service"
  APP_INTERNAL_JWT_ISSUER: "internal-auth"
  APP_INTERNAL_JWT_TTL: "PT5M"
  APP_INTERNAL_JWT_KID: "internal-key-2026-04"
  APP_INTERNAL_JWT_PRIVATE_KEY_PATH: "/var/run/secrets/internal-jwt/private.pem"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: vibecheck
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "app_user"
  SPRING_DATASOURCE_PASSWORD: "app_password"
  SPRING_MAIL_PASSWORD: "kidfsfoduipvzagp"
  SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="app_user" password="app_password";'
  APP_JWT_SECRET: "change-this-super-long-random-secret-key-change-this-super-long-random-secret-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-internal-jwt-key
  namespace: vibecheck
type: Opaque
stringData:
  private.pem: |
    -----BEGIN PRIVATE KEY-----
    REPLACE_WITH_PKCS8_RSA_PRIVATE_KEY
    -----END PRIVATE KEY-----
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: vibecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: ikeeo/vibecheck-user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: user-service-config
            - secretRef:
                name: user-service-secrets
          volumeMounts:
            - name: internal-jwt-key
              mountPath: /var/run/secrets/internal-jwt
              readOnly: true
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: internal-jwt-key
          secret:
            secretName: user-service-internal-jwt-key
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: vibecheck
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8080
      targetPort: http
