apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: vibecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"

            - name: KAFKA_CLUSTERS_0_NAME
              value: "vibecheck"

            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka.vibecheck.svc.cluster.local:9092"

            - name: KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL
              value: "SASL_PLAINTEXT"

            - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_MECHANISM
              value: "PLAIN"

            - name: KAFKA_CLUSTERS_0_PROPERTIES_SASL_JAAS_CONFIG
              value: >-
                org.apache.kafka.common.security.plain.PlainLoginModule required
                username="app_user"
                password="app_password";

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3

---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: vibecheck
spec:
  type: ClusterIP
  selector:
    app: kafka-ui
  ports:
    - name: http
      port: 8080
      targetPort: http