spring.application.name=UserService
server.port=${SERVER_PORT:9189}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:15432/user_service_api_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vitalik}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:huy_sosi}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:16379}
spring.data.redis.timeout=5s
spring.cache.redis.time-to-live=20m

spring.cache.type=redis

spring.mail.host=smtp.yandex.ru
spring.mail.port=587
spring.mail.username=vvfedotov@edu.hse.ru
spring.mail.password=kidfsfoduipvzagp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.properties.security.protocol=${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:}
spring.kafka.properties.sasl.jaas.config=${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}

spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.ByteArraySerializer

spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.properties.compression.type=zstd

user-service.kafka.topic.users=${USER_SERVICE_KAFKA_TOPIC_USERS:users}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# jwt
app.jwt.secret=change-this-super-long-random-secret-key-change-this-super-long-random-secret-key
app.jwt.access-token-ttl=PT10M
app.jwt.refresh-token-ttl=P14D
app.jwt.issuer=auth-service
