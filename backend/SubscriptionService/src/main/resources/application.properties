spring.application.name=SubscriptionService
server.port=${SERVER_PORT:9089}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://subscription_service_api_db:5432/subscription_service_api_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:vitalik}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:huy_sosi}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:subscription-service-redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=${SPRING_KAFKA_CONSUMER_GROUP_ID:subscription-service-feed-consumers}
spring.kafka.properties.security.protocol=${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:SASL_PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:PLAIN}
spring.kafka.properties.sasl.jaas.config=${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}
spring.kafka.listener.missing-topics-fatal=false

app.internal-jwt.issuer=${APP_INTERNAL_JWT_ISSUER:user-service}
app.internal-jwt.audience=${APP_INTERNAL_JWT_AUDIENCE:subscription-service}
app.internal-jwt.kid=${APP_INTERNAL_JWT_KID:internal-key-2026-04}
app.internal-jwt.public-key-path=${APP_INTERNAL_JWT_PUBLIC_KEY_PATH}

app.feed.activity-ttl=${APP_FEED_ACTIVITY_TTL:P30D}
app.feed.hot-size=${APP_FEED_HOT_SIZE:30}
app.feed.heavy-author-enter-threshold=${APP_FEED_HEAVY_AUTHOR_ENTER_THRESHOLD:1000}
app.feed.heavy-author-exit-threshold=${APP_FEED_HEAVY_AUTHOR_EXIT_THRESHOLD:800}
app.feed.heavy-author-refresh-delay=${APP_FEED_HEAVY_AUTHOR_REFRESH_DELAY:PT5M}

app.kafka.topics.users=${APP_KAFKA_TOPIC_USERS:users}
app.kafka.topics.reviews-written=${APP_KAFKA_TOPIC_REVIEWS_WRITTEN:reviews-written}
app.kafka.topics.reviews-liked=${APP_KAFKA_TOPIC_REVIEWS_LIKED:reviews-liked}
app.kafka.topics.gamification-achievement=${APP_KAFKA_TOPIC_GAMIFICATION_ACHIEVEMENT:gamification-achievement}
app.kafka.topics.gamification-level=${APP_KAFKA_TOPIC_GAMIFICATION_LEVEL:gamification-level}
app.kafka.topics.subscriptions=${APP_KAFKA_TOPIC_SUBSCRIPTIONS:subscriptions}
