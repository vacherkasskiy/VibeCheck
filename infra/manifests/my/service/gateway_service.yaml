apiVersion: v1
kind: Namespace
metadata:
  name: vibecheck
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-service-config
  namespace: vibecheck
data:
  SERVER_PORT: "8080"
  GATEWAY_SERVICES_USER_SERVICE_URL: "http://user-service:8080"
  GATEWAY_SERVICES_SUBSCRIPTION_SERVICE_URL: "http://subscription-service:8080"
  GATEWAY_SERVICES_REVIEW_SERVICE_URL: "http://review-service:8080"
  GATEWAY_SERVICES_GAMIFICATION_SERVICE_URL: "http://gamification-service:8080"
  GATEWAY_TLS_ENABLED: "false"
  GATEWAY_TLS_CLIENT_AUTH: "NONE"
  GATEWAY_TLS_PROTOCOL: "TLS"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-service
  namespace: vibecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway-service
  template:
    metadata:
      labels:
        app: gateway-service
    spec:
      containers:
        - name: gateway-service
          image: gonefladvedotov/vibecheck-gateway-service:8.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: gateway-service-config
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-service
  namespace: vibecheck
spec:
  type: ClusterIP
  selector:
    app: gateway-service
  ports:
    - name: http
      port: 8080
      targetPort: http
