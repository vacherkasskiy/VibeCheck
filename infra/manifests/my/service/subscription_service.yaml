apiVersion: v1
kind: Namespace
metadata:
  name: vibecheck
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: subscription-service-config
  namespace: vibecheck
data:
  SERVER_PORT: "8080"
  SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres-postgresql:5432/subscription_service"
  SPRING_DATA_REDIS_HOST: "redis-master"
  SPRING_DATA_REDIS_PORT: "6379"
  SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka.vibecheck.svc.cluster.local:9092"
  SPRING_KAFKA_CONSUMER_GROUP_ID: "subscription-service-feed-consumers"
  SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
  SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "PLAIN"
  APP_INTERNAL_JWT_ISSUER: "user-service"
  APP_INTERNAL_JWT_AUDIENCE: "subscription-service"
  APP_INTERNAL_JWT_KID: "internal-key-2026-04"
  APP_INTERNAL_JWT_PUBLIC_KEY_PATH: "/var/run/secrets/internal-jwt/public.pem"
  APP_FEED_ACTIVITY_TTL: "P30D"
  APP_KAFKA_TOPIC_USERS: "users"
---
apiVersion: v1
kind: Secret
metadata:
  name: subscription-service-secrets
  namespace: vibecheck
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: "app_user"
  SPRING_DATASOURCE_PASSWORD: "app_password"
  SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.plain.PlainLoginModule required username="app_user" password="app_password";'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscription-service
  namespace: vibecheck
spec:
  replicas: 1
  selector:
    matchLabels:
      app: subscription-service
  template:
    metadata:
      labels:
        app: subscription-service
    spec:
      containers:
        - name: subscription-service
          image: gonefladvedotov/vibecheck-subscription-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: subscription-service-config
            - secretRef:
                name: subscription-service-secrets
          volumeMounts:
            - name: internal-jwt-key
              mountPath: /var/run/secrets/internal-jwt
              readOnly: true
          resources:
            requests:
              cpu: 75m
              memory: 192Mi
            limits:
              cpu: 350m
              memory: 384Mi
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: internal-jwt-key
          secret:
            secretName: internal-jwt-public-key
---
apiVersion: v1
kind: Service
metadata:
  name: subscription-service
  namespace: vibecheck
spec:
  type: ClusterIP
  selector:
    app: subscription-service
  ports:
    - name: http
      port: 8080
      targetPort: http
