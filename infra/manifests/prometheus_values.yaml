alertmanager:
  enabled: false

server:
  enabled: true
  persistentVolume:
    enabled: true
    size: 5Gi
  service:
    type: ClusterIP
    servicePort: 9090
  extraFlags:
    - web.enable-lifecycle
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

kube-state-metrics:
  enabled: false

prometheus-node-exporter:
  enabled: false

prometheus-pushgateway:
  enabled: false
